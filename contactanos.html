    <link rel="preload" href="css/normalize.css" as="style" />
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="preload" href="css/styles.css" as="style" />

<body>
    <header>
        <h1 class="titulo">TECH<span>ZONE<span></h1>
        <!--img src="img/iconoR_SF.png" width="12%"-->

    <div class="nav-bg">
        <nav class="navegacion-principal contenedor">

            <a href="contactanos.html">CONTACTANOS</a>
        </nav>

    <section>
        <h2>¡Contáctanos!</h2>
        <form class="form">
            <fieldset>
                <legend>Datos</legend>

                <br>
                <div>
                    <label>Nombre: </label>
                    <input type="text" placeholder="Escriba su nombre">
                </div>

                <br>
                <div>
                    <label>Teléfono: </label>
                    <input type="tel" placeholder="Escriba su número">
                </div>

                <br>
                <div>
                    <label>Correo: </label>
                    <input type="email" placeholder="Escriba su correo">
                </div>

                <br>
                <div>
                    <label>Mensaje: </label>
                    <textarea></textarea>
                </div>

                <br>
                <div>
                    <input type="submit" value="Enviar">
                </div>
                
            </fieldset>
        </form>
    </section>

    <footer>
